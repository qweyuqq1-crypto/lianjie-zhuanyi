<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博控制台 - 后端管理</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Space Grotesk and Share Tech Mono Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', 'Microsoft YaHei', sans-serif;
            background-color: #03000a;
            overflow-x: hidden;
        }

        /* Ambient Cyber Punk Grid */
        .neon-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1.5px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1.5px);
            background-size: 50px 50px;
            background-position: center;
            transform: perspective(500px) rotateX(60deg) translateY(-20%) translateZ(-150px);
            transform-origin: top center;
            animation: grid-scroll 32s linear infinite;
            z-index: 1;
        }

        @keyframes grid-scroll {
            0% { background-position-y: 0px; }
            100% { background-position-y: 1200px; }
        }

        /* Stars Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, #03000a 90%),
                        radial-gradient(1px 1px at 40px 50px, #eed, rgba(0,0,0,0)),
                        radial-gradient(1.5px 1.5px at 120px 140px, #ff007f, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 280px 220px, #00f0ff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 420px 310px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 500px 500px;
            z-index: 0;
        }

        /* Scanlines & Noise overlay */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(12, 6, 26, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.08);
        }

        /* Neon Inputs form aesthetics */
        .cyber-input {
            background: rgba(4, 2, 10, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .cyber-input:focus {
            outline: none;
            border-color: #ff007f;
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.4);
            background: rgba(255, 0, 127, 0.03);
            color: #fff;
        }

        /* Custom options wrapper */
        option {
            background-color: #0d061f;
            color: #00f0ff;
        }

        /* Cyber Neon Submit Button */
        .cyber-submit {
            position: relative;
            background: rgba(255, 0, 127, 0.15);
            color: #ff007f;
            border: 2px solid #ff007f;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .cyber-submit:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.2);
            color: #00f0ff;
            border-color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.8);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.5),
                        inset 0 0 10px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        .cyber-submit:active {
            transform: translateY(1px);
        }

        /* Cyber Alert Popups */
        .cyber-alert {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            border-left: 4px solid #00f0ff;
        }
    </style>
</head>
<body class="relative min-h-screen w-full flex items-center justify-center py-12 px-4 selection:bg-cyan-500 selection:text-black">

    <!-- Backdrops -->
    <div class="stars"></div>
    <div class="neon-grid"></div>
    <div class="scanlines"></div>

    <!-- Feedback Cyber Notification Log Toast -->
    <div id="cyber-toast" class="fixed top-8 right-8 z-50 transform translate-x-72 opacity-0 transition-all duration-500 ease-out">
        <div class="cyber-alert bg-slate-950/90 backdrop-blur-md text-cyan-400 p-5 rounded border border-[#00f0ff] flex items-center gap-4 min-w-[320px]">
            <div id="toast-icon-box" class="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse"></div>
            <div>
                <h4 id="toast-title" class="font-bold font-mono text-sm tracking-wider uppercase mb-0.5">系统日志</h4>
                <p id="toast-desc" class="font-mono text-xs opacity-80">进程数据成功写入。</p>
            </div>
        </div>
    </div>

    <!-- Auth Gate Card -->
    <div id="auth-gate-panel" class="hidden glass-panel relative z-10 w-full max-w-md p-8 md:p-12 rounded-2xl flex flex-col justify-between">
        <!-- Corner Decors -->
        <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-[#ff007f]"></div>
        <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#ff007f]"></div>
        <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#ff007f]"></div>
        <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-[#ff007f]"></div>

        <!-- Back to Gateway link -->
        <div class="mb-6 self-start">
            <a href="/" class="font-mono text-xs text-[#00f0ff]/70 hover:text-pink-500 transition-colors duration-300 flex items-center gap-1">
                &lt;-- 返回霓虹传送网关 // GATEWAY_PORTAL
            </a>
        </div>

        <h2 class="text-2xl font-bold tracking-widest text-[#ff007f] uppercase mb-1 flex items-center gap-3">
            <span class="inline-block w-2.5 h-2.5 bg-pink-500 rounded-full animate-ping"></span>
            安全访问验证
        </h2>
        <p class="font-mono text-[10px] text-pink-500/80 tracking-widest mb-8 uppercase border-b border-pink-500/25 pb-3">
            GUARD_PROX_GATE // SECURE IDENTITY CHECK
        </p>

        <form id="auth-form" class="space-y-6">
            <div class="flex flex-col space-y-2">
                <label for="gate-password-input" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    请输入管理员密码 // IDENT_KEY:
                </label>
                <input 
                    type="password" 
                    id="gate-password-input" 
                    required 
                    placeholder="请输入系统主安全校验密码" 
                    class="cyber-input px-4 py-3 rounded text-sm w-full"
                    autocomplete="current-password"
                >
            </div>

            <button 
                type="submit" 
                id="auth-btn" 
                class="cyber-submit w-full py-4 text-center rounded uppercase text-sm font-bold tracking-widest transition-all duration-300"
            >
                密钥解密校验 // ACCESS GATE
            </button>
        </form>
    </div>

    <!-- Center Card -->
    <div id="main-admin-panel" class="hidden glass-panel relative z-10 w-full max-w-xl p-8 md:p-12 rounded-2xl flex flex-col justify-between">
        <!-- Corner Decors -->
        <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-[#00f0ff]"></div>
        <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#00f0ff]"></div>
        <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#00f0ff]"></div>
        <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-[#00f0ff]"></div>

        <!-- Back to Gateway link -->
        <div class="mb-6 self-start">
            <a href="/" class="font-mono text-xs text-[#00f0ff]/70 hover:text-pink-500 transition-colors duration-300 flex items-center gap-1">
                &lt;-- 返回霓虹传送网关 // GATEWAY_PORTAL
            </a>
        </div>

        <h2 class="text-2xl md:text-3xl font-bold tracking-widest text-[#00f0ff] uppercase mb-1 flex items-center gap-3">
            <span class="inline-block w-3 h-3 bg-pink-500 rounded-full animate-pulse shadow-[0_0_10px_#ff007f]"></span>
            主控配置面板
        </h2>
        <p class="font-mono text-[10px] text-pink-500/80 tracking-widest mb-8 uppercase border-b border-pink-500/25 pb-3">
            控制中心接口 / 接入端 99 // CLOUDFLARE KV 远程配置区
        </p>

        <!-- Configuration Form -->
        <form id="config-form" class="space-y-6">
            <!-- Title -->
            <div class="flex flex-col space-y-2">
                <label for="title-input" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    传送主按钮显示文本 // BUTTON_TITLE_LABEL:
                </label>
                <input 
                    type="text" 
                    id="title-input" 
                    required 
                    placeholder="请输入按钮文字（例如：霓虹世界接入通道）" 
                    class="cyber-input px-4 py-3 rounded text-sm w-full"
                    autocomplete="off"
                >
            </div>

            <!-- Target URL / QR image URL -->
            <div class="flex flex-col space-y-2">
                <label for="url-input" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    目标跳转链接 或 微信二维码图片地址 // LINK_OR_QR_IMAGE_URL:
                </label>
                <input 
                    type="url" 
                    id="url-input" 
                    required 
                    placeholder="请输入 http:// 或 https:// 协议完整路径" 
                    class="cyber-input px-4 py-3 rounded text-sm w-full"
                    autocomplete="off"
                >
            </div>

            <!-- Link Type -->
            <div class="flex flex-col space-y-2">
                <label for="type-select" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    链接路由协议类型 // LINK_REDIRECT_PROTOCOL:
                </label>
                <select 
                    id="type-select" 
                    class="cyber-input px-4 py-3 rounded text-sm w-full select-none"
                >
                    <option value="web">普通网页跳转通道 // NORMAL WEBPAGE</option>
                    <option value="qq">QQ跳转协议 // QQ PROTOCOL</option>
                    <option value="wechat">微信模态二维码获取 // WECHAT QR MODAL</option>
                </select>
            </div>

            <!-- Background Image URL -->
            <div class="flex flex-col space-y-2">
                <label for="bg-image-input" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    背景图片地址 (留空使用默认渐变暗底) // BACKGROUND_IMAGE_URL:
                </label>
                <input 
                    type="url" 
                    id="bg-image-input" 
                    placeholder="请输入背景图片的 http:// 或 https:// 完整地址" 
                    class="cyber-input px-4 py-3 rounded text-sm w-full"
                    autocomplete="off"
                >
            </div>

            <!-- Accent Color Hex -->
            <div class="flex flex-col space-y-2">
                <label for="accent-color-input" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    系统核心霓虹色 (十六进制 hex) // ACCENT_COLOR_HEX:
                </label>
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="accent-color-input" 
                        placeholder="例如 #00f0ff 或 #ff007f(霓红粉) 或 #8b5cf6(幻能紫)" 
                        class="cyber-input px-4 py-3 rounded text-sm flex-1"
                        autocomplete="off"
                    >
                    <input 
                        type="color" 
                        id="accent-color-picker" 
                        value="#00f0ff"
                        class="w-12 h-11 rounded cursor-pointer border border-[#00f0ff]/30 bg-transparent p-1"
                    >
                </div>
            </div>

            <!-- Admin Password -->
            <div class="flex flex-col space-y-2">
                <label for="password-input" class="font-mono text-xs text-[#00f0ff] tracking-widest uppercase">
                    安全访问校验密码 // ADMINISTRATOR_ACCESS_PASS:
                </label>
                <input 
                    type="password" 
                    id="password-input" 
                    required 
                    placeholder="核心主管理员校验密钥 (预设默认: admin123)" 
                    class="cyber-input px-4 py-3 rounded text-sm w-full"
                    autocomplete="current-password"
                >
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                id="submit-btn" 
                class="cyber-submit w-full py-4 text-center rounded uppercase text-sm font-bold tracking-widest transition-all duration-300"
            >
                写入新参数至 CONFIG_KV 云存储
            </button>
        </form>

        <!-- Status Log Readout -->
        <div id="readout-box" class="mt-8 p-4 bg-slate-950/70 border border-slate-800 rounded font-mono text-xs text-[#00f0ff]/60 leading-relaxed overflow-x-auto max-w-full">
            <p class="text-pink-500/70 mb-1">&gt; 联机获取当前云数据库参数 (fetch_configuration_status)...</p>
            <p id="kv-current-val" class="opacity-90">正在与 Cloudflare 数据库节点建立虚拟数据握手...</p>
        </div>
    </div>

    <script>
        const API_URL = '/api/link';
        const form = document.getElementById('config-form');
        const titleInput = document.getElementById('title-input');
        const urlInput = document.getElementById('url-input');
        const typeSelect = document.getElementById('type-select');
        const bgImageInput = document.getElementById('bg-image-input');
        const accentColorInput = document.getElementById('accent-color-input');
        const accentColorPicker = document.getElementById('accent-color-picker');
        const passwordInput = document.getElementById('password-input');
        const submitBtn = document.getElementById('submit-btn');
        const kvCurrentVal = document.getElementById('kv-current-val');

        // Elements for Auth Gate
        const authGatePanel = document.getElementById('auth-gate-panel');
        const mainAdminPanel = document.getElementById('main-admin-panel');
        const authForm = document.getElementById('auth-form');
        const gatePasswordInput = document.getElementById('gate-password-input');

        // Color input & picker sync
        accentColorInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if (/^#[0-9a-fA-F]{6}$/.test(val)) {
                accentColorPicker.value = val;
            }
        });
        accentColorPicker.addEventListener('input', (e) => {
            accentColorInput.value = e.target.value;
        });

        // Toast trigger helper
        function showToast(title, desc, isError = false) {
            const toast = document.getElementById('cyber-toast');
            const toastTitle = document.getElementById('toast-title');
            const toastDesc = document.getElementById('toast-desc');
            const iconBox = document.getElementById('toast-icon-box');

            toastTitle.innerText = title;
            toastDesc.innerText = desc;

            if (isError) {
                toast.querySelector('.cyber-alert').style.borderColor = '#ff007f';
                toast.querySelector('.cyber-alert').style.boxShadow = '0 0 20px rgba(255, 0, 127, 0.4)';
                iconBox.style.backgroundColor = '#ff007f';
                toastTitle.style.color = '#ff007f';
            } else {
                toast.querySelector('.cyber-alert').style.borderColor = '#00f0ff';
                toast.querySelector('.cyber-alert').style.boxShadow = '0 0 20px rgba(0, 240, 255, 0.4)';
                iconBox.style.backgroundColor = '#00f0ff';
                toastTitle.style.color = '#00f0ff';
            }

            toast.classList.remove('opacity-0', 'translate-x-72');
            toast.classList.add('opacity-100', 'translate-x-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-72');
                toast.classList.remove('opacity-100', 'translate-x-0');
            }, 4000);
        }

        // Check login state
        function initPanel() {
            const savedPass = sessionStorage.getItem('admin_pass');
            if (savedPass) {
                authGatePanel.classList.add('hidden');
                mainAdminPanel.classList.remove('hidden');
                passwordInput.value = savedPass;
                fetchCurrentConfigs();
            } else {
                authGatePanel.classList.remove('hidden');
                mainAdminPanel.classList.add('hidden');
            }
        }

        // Auth Gate Form handler
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const typedPass = gatePasswordInput.value.trim();
            if (typedPass) {
                sessionStorage.setItem('admin_pass', typedPass);
                passwordInput.value = typedPass;
                authGatePanel.classList.add('hidden');
                mainAdminPanel.classList.remove('hidden');
                fetchCurrentConfigs();
                showToast('解密校验成功', '操作凭证已载入。请输入需要同步的配置参数。');
            }
        });

        // Fetch current values
        async function fetchCurrentConfigs() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const data = await response.json();
                    
                    let friendlyType = "标准网页";
                    if (data.link_type === 'qq') friendlyType = "QQ通道";
                    if (data.link_type === 'wechat') friendlyType = "微信二维码";

                    kvCurrentVal.innerHTML = `存储空间键: "MAIN_LINK"<br>
                      &nbsp;&nbsp;↳ 按钮文本: "${data.title || ''}"<br>
                      &nbsp;&nbsp;↳ 部署链接: "${data.url || ''}"<br>
                      &nbsp;&nbsp;↳ 路由协议: "${friendlyType} (${data.link_type || ''})"<br>
                      &nbsp;&nbsp;↳ 背景图片: "${data.bg_image || '默认暗底渐变'}"<br>
                      &nbsp;&nbsp;↳ 霓虹主题色: "${data.accent_color || '#00f0ff'}"` ;
                    
                    // Pre-fill fields for ease of edit
                    titleInput.value = data.title || '';
                    urlInput.value = data.url || '';
                    typeSelect.value = data.link_type || 'web';
                    bgImageInput.value = data.bg_image || '';
                    const col = data.accent_color || '#00f0ff';
                    accentColorInput.value = col;
                    accentColorPicker.value = col;
                }
            } catch (err) {
                kvCurrentVal.innerText = `系统同步异常：无法从宿主服务器中获取最新的 KV 记录。`;
            }
        }

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Submit states
            submitBtn.innerText = '正在上传数据流...';
            submitBtn.disabled = true;

            const payload = {
                title: titleInput.value.trim(),
                url: urlInput.value.trim(),
                link_type: typeSelect.value,
                bg_image: bgImageInput.value.trim(),
                accent_color: accentColorInput.value.trim(),
                password: passwordInput.value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('数据流上行成功', '新配置已全量同步覆写至 Cloudflare CONFIG_KV 存储块。');
                    sessionStorage.setItem('admin_pass', passwordInput.value); // Ensure preserved
                    fetchCurrentConfigs(); // Refresh values
                } else if (response.status === 401) {
                    showToast('写入安全受阻', '上传权限控制错误：校验密码错误！您的会话已被注销。', true);
                    sessionStorage.removeItem('admin_pass');
                    passwordInput.value = '';
                    gatePasswordInput.value = '';
                    setTimeout(() => {
                        initPanel();
                    }, 1500);
                } else {
                    showToast('写入安全受阻', result.error || '上传发生了未知错误，请确认配置数据合法。', true);
                }
            } catch (err) {
                showToast('主网连接超时', '无法建立传输通信握手，请重试。', true);
            } finally {
                submitBtn.innerText = '写入新参数至 CONFIG_KV 云存储';
                submitBtn.disabled = false;
            }
        });

        // Initial loading sequence
        window.addEventListener('DOMContentLoaded', initPanel);
    </script>
</body>
</html>
