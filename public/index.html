<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博霓虹链接传送门</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Space Grotesk and Share Tech Mono Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', 'Microsoft YaHei', sans-serif;
            background-color: #03000a;
            overflow: hidden;
        }

        /* Ambient Cyber Punk Grid and Background */
        .neon-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1.5px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1.5px);
            background-size: 50px 50px;
            background-position: center;
            transform: perspective(500px) rotateX(60deg) translateY(-30%) translateZ(-100px);
            transform-origin: top center;
            animation: grid-scroll 24s linear infinite;
            z-index: 1;
        }

        @keyframes grid-scroll {
            0% {
                background-position-y: 0px;
            }
            100% {
                background-position-y: 1200px;
            }
        }

        /* Star field generator */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, #03000a 80%),
                        radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                        radial-gradient(1.5px 1.5px at 150px 80px, #00f0ff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 300px 240px, #ff007f, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 450px 120px, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 600px 350px, #00f0ff, rgba(0,0,0,0)),
                        radial-gradient(1.5px 1.5px at 750px 180px, #ff007f, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 550px 550px;
            animation: star-drift 60s linear infinite;
            z-index: 0;
        }

        @keyframes star-drift {
            0% { background-position: 0 0; }
            100% { background-position: 550px 275px; }
        }

        /* Cyberpunk scanlines and noise overlay */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.06), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Glassmorphism card styling */
        .glass-panel {
            background: rgba(14, 8, 28, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.25);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1),
                        inset 0 0 15px rgba(255, 0, 127, 0.05);
            transition: all 0.5s ease;
        }

        .glass-panel:hover {
            border-color: rgba(255, 0, 127, 0.45);
            box-shadow: 0 0 45px rgba(255, 0, 127, 0.2),
                        inset 0 0 25px rgba(0, 240, 255, 0.1);
        }

        /* Glowing Neon button with animated border and box-shadow */
        .neon-button {
            position: relative;
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 1.15rem;
            border: 2px solid #00f0ff;
            padding: 1.1rem 2.5rem;
            outline: none;
            overflow: hidden;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3),
                        inset 0 0 10px rgba(0, 240, 255, 0.2);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
            cursor: pointer;
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255, 0, 127, 0.5), 
                transparent
            );
            transition: all 0.6s ease;
        }

        .neon-button:hover::before {
            left: 100%;
        }

        .neon-button:hover {
            color: #ff007f;
            background: rgba(255, 0, 127, 0.15);
            border-color: #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.7),
                        inset 0 0 15px rgba(255, 0, 127, 0.4);
            transform: translateY(-3px) scale(1.03);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8);
        }

        .neon-button:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Glass Modal Box */
        .glass-modal {
            background: rgba(10, 6, 22, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid #ff007f;
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.4),
                        inset 0 0 30px rgba(0, 240, 255, 0.1);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #00f0ff, #ff007f, #00f0ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Grid Scanning Lights */
        .scanner-beam {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            animation: scan 6s linear infinite;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="relative min-h-screen w-full flex items-center justify-center selection:bg-pink-500 selection:text-white">

    <!-- Ambient Visual Overlays -->
    <div class="stars"></div>
    <div class="neon-grid"></div>
    <div class="scanlines"></div>
    <div class="scanner-beam"></div>

    <!-- Central Glassmorphism Card -->
    <div id="main-card" class="glass-panel relative z-10 w-11/12 max-w-lg p-10 md:p-14 rounded-2xl flex flex-col items-center justify-center text-center">
        <!-- Corner Cyber Decors -->
        <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-[#00f0ff]"></div>
        <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-[#00f0ff]"></div>
        <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-[#00f0ff]"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-[#00f0ff]"></div>

        <!-- Loading Indicator with Cyber Styling -->
        <div id="loading" class="flex flex-col items-center py-6">
            <div class="w-12 h-12 border-4 border-cyan-400/20 border-t-cyan-400 rounded-full animate-spin mb-4"></div>
            <p class="font-mono text-cyan-400 text-sm tracking-widest animate-pulse">正在安全连接至赛博主网...</p>
        </div>

        <!-- Master Button (Will be populated dynamically) -->
        <div id="button-container" class="hidden w-full flex flex-col items-center justify-center my-6">
            <button id="action-button" class="neon-button px-8 py-4 w-full sm:w-auto min-w-[280px]">
                点击
            </button>
        </div>
    </div>

    <!-- WeChat Modeless QR Code Modal -->
    <div id="wechat-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/85 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div id="modal-content" class="glass-modal p-8 rounded-2xl max-w-sm w-full relative flex flex-col items-center justify-center text-center transform scale-95 transition-transform duration-300">
            <!-- Close Button -->
            <button id="close-modal-btn" class="absolute top-4 right-4 text-cyan-400 hover:text-pink-500 font-mono text-xl focus:outline-none transition-colors duration-300">
                &times;
            </button>
            
            <!-- Deco Borders -->
            <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-pink-500"></div>
            <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-pink-500"></div>
            <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-pink-500"></div>
            <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-pink-500"></div>

            <h3 class="font-mono text-lg text-pink-500 uppercase tracking-widest mb-6 font-bold flex items-center gap-2">
                <span class="inline-block w-2.5 h-2.5 rounded-full bg-pink-500 animate-pulse"></span>
                微信密钥网关
            </h3>

            <!-- QR Code container -->
            <div class="border-2 border-cyan-400/30 p-2.5 bg-black/40 rounded-lg shadow-lg shadow-cyan-500/10 mb-6 group relative overflow-hidden">
                <img id="qr-code-img" src="" alt="微信二维码" class="w-56 h-56 object-contain rounded-md animate-pulse" />
                <div class="absolute inset-0 border border-transparent group-hover:border-cyan-400 transition-colors duration-300 pointer-events-none"></div>
            </div>

            <p class="font-mono text-xs text-cyan-400/75 tracking-wider leading-relaxed">
                请微信扫描上方二维码<br>
                验证生物密钥建立安全连接
            </p>
            
            <button id="dismiss-btn" class="mt-6 px-5 py-2 border border-pink-500 bg-pink-500/10 text-pink-500 font-mono text-xs uppercase tracking-widest hover:bg-pink-500 hover:text-white rounded-md transition-all duration-300 select-none">
                关闭此网关通道
            </button>
        </div>
    </div>

    <!-- Front-end Dynamic Logic -->
    <script>
        const API_URL = '/api/link';
        const loadingEl = document.getElementById('loading');
        const buttonContainer = document.getElementById('button-container');
        const actionButton = document.getElementById('action-button');
        const wechatModal = document.getElementById('wechat-modal');
        const modalContent = document.getElementById('modal-content');
        const qrCodeImg = document.getElementById('qr-code-img');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const dismissBtn = document.getElementById('dismiss-btn');

        let currentLinkData = null;
        let audioCtx = null;

        // Dynamic sound generator for cyberpunk glitch on hover
        function playCyberGlitchSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const now = audioCtx.currentTime;
                const dur = 0.12;

                // Oscillator 1: high crunchy square pitch slide
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(650, now);
                osc1.frequency.exponentialRampToValueAtTime(1400, now + dur);

                gain1.gain.setValueAtTime(0.04, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + dur);

                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);

                // Oscillator 2: short digital click layer
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(120, now);
                osc2.frequency.setValueAtTime(950, now + 0.02);

                gain2.gain.setValueAtTime(0.03, now);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.07);

                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);

                // Clean up references to conserve performance resources
                osc1.onended = () => {
                    osc1.disconnect();
                    gain1.disconnect();
                };
                osc2.onended = () => {
                    osc2.disconnect();
                    gain2.disconnect();
                };

                osc1.start(now);
                osc1.stop(now + dur);

                osc2.start(now);
                osc2.stop(now + 0.07);
            } catch (e) {
                console.warn("Web Audio Context initialization status blocked or unsupported.", e);
            }
        }

        // RGBA helper function
        function hexToRgba(hex, alpha) {
            if (!hex || !hex.startsWith('#')) return `rgba(0, 240, 255, ${alpha})`;
            const cleanHex = hex.replace('#', '');
            let r = parseInt(cleanHex.substring(0, 2), 16);
            let g = parseInt(cleanHex.substring(2, 4), 16);
            let b = parseInt(cleanHex.substring(4, 6), 16);
            if (isNaN(r) || isNaN(g) || isNaN(b)) {
                return `rgba(0, 240, 255, ${alpha})`;
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Fetch Link Details
        async function fetchLinkDetails() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error('网络异常，获取数据失败');
                }
                const data = await response.json();
                currentLinkData = data;
                renderButton(data);
            } catch (err) {
                console.error(err);
                // Fallback rendering using optimal default attributes
                const fallbackData = {
                    title: "点击",
                    url: "https://gordoncyber.net",
                    link_type: "web",
                    bg_image: "",
                    accent_color: "#00f0ff"
                };
                currentLinkData = fallbackData;
                renderButton(fallbackData);
            }
        }

        // Render Action Button and Apply Style Settings
        function renderButton(data) {
            loadingEl.classList.add('hidden');
            buttonContainer.classList.remove('hidden');
            
            // Allow dynamic text override defined by config, fallback to '点击'
            actionButton.innerText = data.title || '点击';
            
            // Set dynamic background image if specified with smooth visual blend transitions
            if (data.bg_image && data.bg_image.trim()) {
                document.body.style.backgroundImage = `url('${data.bg_image}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center center';
                document.body.style.backgroundRepeat = 'no-repeat';
                document.body.style.transition = 'background-image 0.8s ease-in-out';
            } else {
                document.body.style.backgroundImage = 'none';
            }

            // Compute dynamic active neon accent color
            const activeColor = data.accent_color || (data.link_type === 'wechat' ? '#ff007f' : '#00f0ff');
            
            // Inject dynamic style overrides inside a single persistent element (avoid bloating the DOM)
            let styleEl = document.getElementById('dynamic-neon-styles');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-neon-styles';
                document.head.appendChild(styleEl);
            }
            styleEl.innerHTML = `
                .neon-button {
                    color: ${activeColor} !important;
                    border-color: ${activeColor} !important;
                    background: ${hexToRgba(activeColor, 0.1)} !important;
                    box-shadow: 0 0 15px ${hexToRgba(activeColor, 0.35)}, inset 0 0 10px ${hexToRgba(activeColor, 0.2)} !important;
                    text-shadow: 0 0 8px ${hexToRgba(activeColor, 0.6)} !important;
                }
                .neon-button:hover {
                    color: #ffffff !important;
                    background: ${activeColor} !important;
                    border-color: ${activeColor} !important;
                    box-shadow: 0 0 30px ${hexToRgba(activeColor, 0.85)}, inset 0 0 15px ${activeColor} !important;
                    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8) !important;
                }
                .scanner-beam {
                    background: linear-gradient(90deg, transparent, ${activeColor}, transparent) !important;
                }
                .glass-panel {
                    border-color: ${hexToRgba(activeColor, 0.25)} !important;
                    box-shadow: 0 0 30px ${hexToRgba(activeColor, 0.1)}, inset 0 0 15px ${hexToRgba(activeColor, 0.05)} !important;
                }
                .glass-panel:hover {
                    border-color: ${activeColor} !important;
                    box-shadow: 0 0 45px ${hexToRgba(activeColor, 0.35)}, inset 0 0 25px ${hexToRgba(activeColor, 0.15)} !important;
                }
            `;
        }

        // Trigger Audio on Hover
        actionButton.addEventListener('mouseenter', () => {
            playCyberGlitchSound();
        });

        // Action Button Click Interaction
        actionButton.addEventListener('click', () => {
            if (!currentLinkData) return;

            const { link_type, url } = currentLinkData;

            if (link_type === 'web' || link_type === 'qq') {
                window.open(url, '_blank');
            } else if (link_type === 'wechat') {
                qrCodeImg.src = url;
                qrCodeImg.classList.remove('animate-pulse');
                openModal();
            }
        });

        // Modal Control Helper
        function openModal() {
            wechatModal.classList.remove('hidden');
            setTimeout(() => {
                wechatModal.classList.remove('opacity-0');
                wechatModal.classList.add('opacity-100');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            wechatModal.classList.remove('opacity-100');
            wechatModal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                wechatModal.classList.add('hidden');
            }, 300);
        }

        // Modal Action Listeners
        closeModalBtn.addEventListener('click', closeModal);
        dismissBtn.addEventListener('click', closeModal);
        
        // Close modal when clicking parent backdrop
        wechatModal.addEventListener('click', (e) => {
            if (e.target === wechatModal) {
                closeModal();
            }
        });

        // Keyboard navigation close
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !wechatModal.classList.contains('hidden')) {
                closeModal();
            }
        });

        // Initialize Fetch
        window.addEventListener('DOMContentLoaded', fetchLinkDetails);
    </script>
</body>
</html>
